services:
  app:
    build: .
    image: kcblendz:dev
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - KCB_DB_PATH=/data/kcblendz.db
      - PORT=5000
    volumes:
      - ./:/app
      - kcb-data:/data
    command: py app.py
    restart: unless-stopped

volumes:
  kcb-data:
