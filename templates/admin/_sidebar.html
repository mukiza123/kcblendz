<aside class="w-full md:w-60 mb-6 md:mb-0 bg-[var(--kc-dark)] text-white rounded-2xl overflow-hidden">
  <div class="p-5 border-b border-white/10">
    <p class="brand text-xl">KCBlendz</p>
    <p class="text-xs opacity-60">Admin console</p>
  </div>
  <nav class="py-2">
    {% for label, endpoint in [('Dashboard','admin_dashboard'),('Products','admin_products'),('Orders','admin_orders'),('Users','admin_users'),('Builder','admin_builder'),('Blogs','admin_blogs'),('Reports','admin_reports')] %}
      <a href="{{ url_for(endpoint) if endpoint in (config or {}) else '#' }}" class="block px-5 py-2 hover:bg-white/10">{{ label }}</a>
    {% endfor %}
  </nav>
  <form method="POST" action="{{ url_for('logout') }}" class="p-4 border-t border-white/10">
    <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
    <button class="w-full px-3 py-2 bg-white/10 rounded text-sm">Sign out</button>
  </form>
</aside>
