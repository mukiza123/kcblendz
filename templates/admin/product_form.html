{% extends "admin/_layout.html" %}
{% block title %}{{ 'Edit' if product else 'New' }} product — Admin{% endblock %}
{% block admin %}
<h1 class="brand text-3xl mb-6">{{ 'Edit' if product else 'New' }} product</h1>
<form method="POST" class="bg-white rounded-2xl shadow-sm p-6 space-y-4">
  <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
  <div class="grid md:grid-cols-2 gap-4">
    <div><label class="block text-sm mb-1">Name</label><input name="name" required value="{{ product.name if product else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
    <div><label class="block text-sm mb-1">Slug</label><input name="slug" value="{{ product.slug if product else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
    <div class="md:col-span-2"><label class="block text-sm mb-1">Short description</label><input name="short_description" value="{{ product.short_description if product else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
    <div class="md:col-span-2"><label class="block text-sm mb-1">Description</label><textarea name="description" rows="4" class="w-full px-3 py-2 border rounded-lg">{{ product.description if product else '' }}</textarea></div>
    <div class="md:col-span-2"><label class="block text-sm mb-1">Ingredients</label><input name="ingredients" value="{{ product.ingredients if product else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
    <div>
      <label class="block text-sm mb-1">Category</label>
      <select name="category_id" class="w-full px-3 py-2 border rounded-lg">
        <option value="">—</option>
        {% for c in categories %}<option value="{{ c.id }}" {% if product and product.category_id == c.id %}selected{% endif %}>{{ c.name }}</option>{% endfor %}
      </select>
    </div>
    <div><label class="block text-sm mb-1">Price MUR</label><input name="price_mur" type="number" step="0.01" value="{{ product.price_mur if product else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
    <div><label class="block text-sm mb-1">Price NGN</label><input name="price_ngn" type="number" step="0.01" value="{{ product.price_ngn if product else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
    <div><label class="block text-sm mb-1">Price USD</label><input name="price_usd" type="number" step="0.01" value="{{ product.price_usd if product else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
  </div>
  <div class="flex gap-4 pt-3 border-t">
    <label><input type="checkbox" name="is_active" {% if not product or product.is_active %}checked{% endif %}> Active</label>
    <label><input type="checkbox" name="is_featured" {% if product and product.is_featured %}checked{% endif %}> Featured</label>
  </div>
  <button class="px-6 py-2 bg-[var(--kc-green)] text-white rounded-full font-semibold">Save</button>
</form>
{% endblock %}
