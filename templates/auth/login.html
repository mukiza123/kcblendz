{% extends "base.html" %}
{% block title %}Sign in — KCBlendz{% endblock %}

{% block content %}
<section class="max-w-md mx-auto px-4 py-16">
  <h1 class="brand text-3xl mb-6 text-center">Welcome back</h1>

  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
      <div class="rounded p-3 mb-4 {{ 'bg-red-100 text-red-800' if cat=='error' else 'bg-green-100 text-green-800' }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" class="bg-white rounded-2xl shadow p-6 space-y-4">
    <input type="hidden" name="_csrf" value="{{ csrf_token() if csrf_token else '' }}">
    <div>
      <label class="block text-sm font-medium mb-1">Email</label>
      <input type="email" name="email" required class="w-full px-3 py-2 border rounded-lg" autocomplete="email">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Password</label>
      <input type="password" name="password" required class="w-full px-3 py-2 border rounded-lg" autocomplete="current-password">
    </div>
    <button class="w-full py-2 bg-[var(--kc-green)] text-white rounded-lg font-semibold">Sign in</button>

    <p class="text-sm text-center opacity-70">
      No account? <a href="{{ url_for('register') if 'register' in (config or {}) else '/register' }}" class="text-[var(--kc-green)] font-semibold">Create one</a>
    </p>
  </form>
</section>
{% endblock %}
