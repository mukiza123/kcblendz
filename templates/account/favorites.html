{% extends "base.html" %}
{% block title %}Favourites — KCBlendz{% endblock %}
{% block content %}
<section class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
  <h1 class="brand text-3xl mb-6">Favourites</h1>
  <div class="flex flex-col md:flex-row gap-6">
    {% include 'account/_sidebar.html' %}
    <div class="flex-1 grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
      {% for p in products %}
        {% include 'public/_product_card.html' %}
      {% else %}<p class="opacity-60">No favourites yet.</p>{% endfor %}
    </div>
  </div>
</section>
{% endblock %}
