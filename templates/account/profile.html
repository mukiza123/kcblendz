{% extends "base.html" %}
{% block title %}Profile — KCBlendz{% endblock %}
{% block content %}
<section class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
  <h1 class="brand text-3xl mb-6">Profile</h1>
  <div class="flex flex-col md:flex-row gap-6">
    {% include 'account/_sidebar.html' %}
    <form method="POST" class="flex-1 bg-white rounded-2xl shadow-sm p-6 space-y-4">
      <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
      <div><label class="block text-sm mb-1">Full name</label><input name="full_name" value="{{ user.full_name }}" required class="w-full px-3 py-2 border rounded-lg"></div>
      <div><label class="block text-sm mb-1">Email</label><input value="{{ user.email }}" disabled class="w-full px-3 py-2 border rounded-lg bg-gray-50"></div>
      <div><label class="block text-sm mb-1">Phone</label><input name="phone" value="{{ user.phone or '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
      <button class="px-6 py-2 bg-[var(--kc-green)] text-white rounded-full font-semibold">Save changes</button>
    </form>
  </div>
</section>
{% endblock %}
