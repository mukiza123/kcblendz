{% extends "base.html" %}
{% block title %}Shop — KCBlendz{% endblock %}
{% block content %}
<section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <h1 class="brand text-4xl mb-6">Shop</h1>
  <form method="GET" class="grid md:grid-cols-4 gap-3 mb-8">
    <input name="q" value="{{ q }}" placeholder="Search smoothies, juices…"
           class="col-span-2 px-3 py-2 border rounded-lg">
    <select name="category" class="px-3 py-2 border rounded-lg">
      <option value="">All categories</option>
      {% for c in categories %}
        <option value="{{ c.slug }}" {% if cat == c.slug %}selected{% endif %}>{{ c.name }}</option>
      {% endfor %}
    </select>
    <select name="sort" class="px-3 py-2 border rounded-lg">
      <option value="new" {% if sort=='new' %}selected{% endif %}>Newest</option>
      <option value="price-asc" {% if sort=='price-asc' %}selected{% endif %}>Price ↑</option>
      <option value="price-desc" {% if sort=='price-desc' %}selected{% endif %}>Price ↓</option>
    </select>
  </form>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
    {% for p in products %}
      {% include 'public/_product_card.html' %}
    {% else %}
      <p class="opacity-60 col-span-4">No products match your search.</p>
    {% endfor %}
  </div>
</section>
{% endblock %}
